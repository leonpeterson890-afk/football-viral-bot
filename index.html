<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Viral Bot Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .script-card { background: #1e293b; border-radius: 15px; border: 1px solid #334155; margin-bottom: 20px; overflow: hidden; transition: 0.3s; }
        .script-card:hover { border-color: #3b82f6; }
        .loading-spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 max-w-2xl mx-auto">
    <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-400 mb-2">⚽ My Football News</h1>
        <p class="text-gray-400 text-sm">Scripts viral pou TikTok/Reels sou 17 gwo klèb Ewòp</p>
    </header>

    <div class="flex justify-center mb-8">
        <button onclick="fetchFreshNews()" id="refreshBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full shadow-lg flex items-center gap-2 transition">
            <span id="btnText">🔄 Chèche Nouvèl Fre</span>
        </button>
    </div>
    
    <div id="loading" class="hidden text-center text-blue-400 font-bold mb-4">
        <div class="loading-spinner mb-2"></div>
        <p>Robot a ap travay sou AI a, tann yon ti moman...</p>
    </div>

    <div id="content"></div>

    <script>
        // 1. Fonksyon pou chaje istwa a (lè paj la louvri)
        async function loadHistory() {
            const container = document.getElementById('content');
            console.log("LOG: M ap chèche istwa nan database...");
            
            try {
                const response = await fetch('/history?limit=10');
                if (!response.ok) throw new Error(`Erè HTTP: ${response.status}`);
                
                const data = await response.json();
                console.log("LOG: Done resevwa:", data);
                renderNews(data.results);
            } catch (err) {
                console.error("ERÈ ISTWA:", err);
                container.innerHTML = `<p class='text-center text-red-400'>Erè koneksyon ak sèvè a. Verifye si Render "Live".</p>`;
            }
        }

        // 2. Fonksyon pou FÒSE robot a chèche nouvèl fre
        async function fetchFreshNews() {
            const btn = document.getElementById('refreshBtn');
            const loader = document.getElementById('loading');
            
            console.log("LOG: Bouton peze, m ap rele /search...");
            
            btn.disabled = true;
            btn.classList.add('opacity-50');
            loader.classList.remove('hidden');

            try {
                // Atansyon: Rechèch sa ka pran jiska 30 segonn si AI a dousman
                const response = await fetch('/search?q=football');
                const data = await response.json();
                
                console.log("LOG: Rezilta rechèch:", data);
                
                if (data.count > 0) {
                    console.log("LOG: Nouvo nouvèl jwenn, m ap rafrechi lis la...");
                    await loadHistory(); 
                } else {
                    alert("Pa gen nouvo nouvèl pou kounye a. Eseye ankò pita.");
                }
            } catch (err) {
                console.error("ERÈ RECHÈCH:", err);
                alert("Sèvè a pran twòp tan (Timeout). Men, verifye si nouvèl yo pa parèt kanmenm nan 1 minit.");
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                loader.classList.add('hidden');
            }
        }

        // 3. Fonksyon pou montre nouvèl yo sou ekran an
        function renderNews(articles) {
            const container = document.getElementById('content');
            
            if (!articles || articles.length === 0) {
                container.innerHTML = `
                    <div class="text-center p-10 border-2 border-dashed border-slate-700 rounded-2xl">
                        <p class='text-gray-500 mb-2'>Database la vid kounye a.</p>
                        <p class='text-blue-400 text-sm font-bold'>Peze bouton "Chèche Nouvèl Fre" a pou kòmanse.</p>
                    </div>`;
                return;
            }

            container.innerHTML = ''; 
            articles.forEach(item => {
                const card = document.createElement('div');
                card.className = 'script-card';
                
                // Si pa gen imaj, nou pa montre baliz <img> la
                const imgTag = item.image_url ? `<img src="${item.image_url}" class="w-full h-52 object-cover" onerror="this.style.display='none'">` : '';
                
                card.innerHTML = `
                    ${imgTag}
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] bg-blue-900/50 text-blue-300 px-2 py-1 rounded uppercase font-bold">
                                ${item.source || 'Foutbòl'}
                            </span>
                            <span class="text-[10px] text-gray-500">${new Date(item.created_at || Date.now()).toLocaleDateString()}</span>
                        </div>
                        <h2 class="text-xl font-bold mb-3 text-white leading-tight">${item.title}</h2>
                        <div class="bg-slate-900/80 p-4 rounded-lg text-sm mb-4 text-gray-300 border border-slate-700 whitespace-pre-wrap leading-relaxed italic">
                            "${item.scripts_multilingue || 'Script an preparasyon...'}"
                        </div>
                        <button onclick="copyText(this, \`${encodeURIComponent(item.scripts_multilingue)}\`)" 
                                class="w-full bg-slate-800 hover:bg-blue-600 p-3 rounded-xl font-bold transition flex justify-center items-center gap-2 border border-slate-600">
                            <span>Kopye Script</span>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 4. Fonksyon pou kopye tèks
        function copyText(btn, encodedText) {
            const text = decodeURIComponent(encodedText);
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.innerHTML;
                btn.innerHTML = "✅ Kopye nan clipboard!";
                btn.classList.add('bg-green-600', 'border-green-500');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-green-600', 'border-green-500');
                }, 2000);
            });
        }

        // Chaje istwa a otomatikman lè paj la louvri
        window.onload = loadHistory;
    </script>
</body>
</html>
